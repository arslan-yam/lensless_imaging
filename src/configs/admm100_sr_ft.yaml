defaults:
  - model: admm100_sr_ft
  - writer: cometml
  - metrics: lensless
  - datasets: digicam
  - dataloader: lensless
  - transforms: lensless
  - _self_
optimizer:
  _target_: torch.optim.Adam
  lr: 1e-4
lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.9
  step_size: ${trainer.epoch_len}
loss_function:
  _target_: src.loss.LenslessLoss
dataloader:
  batch_size: 4
writer:
  run_name: "admm100_sr_ft"
trainer:
  log_step: 50
  n_epochs: 10
  epoch_len: 500
  device_tensors: ["lensless", "lensed", "psf"]
  resume_from: null
  device: auto
  override: False
  monitor: "max test_PSNRMetric"
  save_period: 5
  early_stop: ${trainer.n_epochs}
  save_dir: "saved"
  seed: 1
