defaults:
  - model: unrolled20
  - writer: cometml
  - metrics: lensless
  - datasets: custom_dir
  - dataloader: lensless
  - transforms: lensless
  - _self_
inferencer:
  device_tensors: ["lensless", "lensed", "psf"] # moved to device only if present
  device: auto # device name or "auto"
  save_path: "reconstructions" # subdir of data/saved with predictions
  seed: 1
  from_pretrained: "saved/model_best.pth" # null to run a parameter-free model (ADMM-100)
writer:
  run_name: ${inferencer.save_path}
trainer:
  resume_from: null # the Comet writer reads this key
